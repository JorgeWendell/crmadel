services:
  db:
    image: postgres:16-alpine
    container_name: adelcrm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adelcrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
      POSTGRES_DB: ${POSTGRES_DB:-adelcrm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-adelcrm} -d ${POSTGRES_DB:-adelcrm}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - adelcrm-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: adelcrm-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-adelcrm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adelcrm}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - adelcrm-network
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    container_name: adelcrm-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-adelcrm}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adelcrm}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Defina BETTER_AUTH_SECRET no arquivo .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - adelcrm-network
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.adelcrm.rule=Host(`${APP_DOMAIN:-crm.adelbr.tech}`)
      - traefik.http.routers.adelcrm.entrypoints=websecure
      - traefik.http.routers.adelcrm.tls.certresolver=letsencrypt
      - traefik.http.services.adelcrm.loadbalancer.server.port=3000

  caddy:
    profiles: ["with-caddy"]
    image: caddy:2-alpine
    container_name: adelcrm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - adelcrm-network

networks:
  adelcrm-network:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
